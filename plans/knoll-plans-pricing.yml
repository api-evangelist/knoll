description: Knoll Inc (a MillerKnoll company) is a commercial furniture manufacturer. They do not publish
  a public API tariff; integrations (dealer/architect catalog, order intake, configuration) are provisioned
  per-partner under the dealer/A&D channel agreement. List prices are surfaced through the Knoll Price
  Book and configurator, not a public API plan.
sources:
  - https://developer.knoll.com
  - https://www.knoll.com
notes: No public API pricing or developer portal reachable. Reconcile from authenticated dealer-channel
  documentation when access is obtained.
plans:
  - id: knoll-dealer-partner
    name: Knoll Dealer / A&D Partner
    type: enterprise
    description: API and integration access provisioned for authorized dealers and A&D firms; product
      pricing follows the Knoll Price Book and dealer-discount structure.
    entries:
      - label: Channel agreement
        name: dealer_agreement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Knoll Inc API (catalog, configuration, order)
      - name: Dealer portal access
