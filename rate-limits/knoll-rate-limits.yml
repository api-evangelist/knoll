specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Knoll Inc
providerId: knoll
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Furniture
  - Design
  - Manufacturing
description: Knoll Inc does not publish API rate limits in the public domain. Throttling is applied per
  authorized dealer/partner and surfaced only inside the gated developer portal documentation.
sources:
  - https://developer.knoll.com
notes: Public rate-limit documentation is not available. Reconcile from gated dealer-channel docs once
  authenticated access is obtained.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-partner API throttling
    scope: partner
    metric: varies
    limit: 'see authenticated Knoll developer portal documentation'
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/5xx responses.
  - name: Idempotency
    description: For order-intake endpoints, use idempotency keys per purchase order.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
