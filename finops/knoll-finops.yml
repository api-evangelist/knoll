specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Knoll Inc
providerId: knoll
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Furniture
  - Manufacturing
description: 'FinOps shape for Knoll Inc: B2B furniture manufacturer billing per purchase order under
  dealer-channel agreements. No public API tariff; product prices follow the Knoll Price Book and dealer
  discount tiers.'
sources:
  - https://www.knoll.com
  - https://developer.knoll.com
notes: No public API pricing. Reconcile cost models from actual purchase orders and dealer-discount
  schedules.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Knoll, Inc. (a MillerKnoll company)
serviceCategory: Furniture & Manufacturing
billingModel:
  pricingCategory: Per Purchase Order (Negotiated Discount)
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Knoll Inc
  ServiceCategory: Furniture
  ProviderName: Knoll Inc
  PublisherName: Knoll, Inc.
  InvoiceIssuerName: Knoll, Inc.
  BillingCurrency: USD
meters:
  - name: purchase_orders
    unit: order
    aggregation: sum
    dimensions:
      - dealer
      - product_line
  - name: line_items
    unit: line
    aggregation: sum
    dimensions:
      - product_line
      - sku
  - name: order_value
    unit: USD
    aggregation: sum
    dimensions:
      - dealer
      - product_line
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
principles:
  - name: Visibility
    description: Use Knoll API order and invoice endpoints (where available) plus dealer EDI feeds to
      track price-book vs net-of-discount per project.
  - name: Allocation
    description: Tag purchase orders by project / floor / business unit so furniture spend rolls up to
      the right cost center.
  - name: Optimization
    description: Negotiate dealer-discount tiers and product-line bundling; use Knoll configurator data
      to compare alternates and consolidate to higher-discount product lines.
  - name: Accountability
    description: Procurement reviews dealer invoices against the Knoll Price Book and contract discount
      tier; disputes mismatches and re-negotiates at the next contract cycle.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
